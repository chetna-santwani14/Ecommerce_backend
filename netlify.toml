[build]
  command = "npm install"
  functions = "functions"
  publish = "."

[functions]
  node_bundler = "esbuild"
  
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[build.environment]
  NODE_OPTIONS = "--experimental-modules"
  ENDPOINT = "/api/v1"
  NETLIFY = "true"